<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Topper's Cave</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0D1117">
  
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

<div id="splash">
  <div class="sp-cave">Topper's Cave</div>
  <div class="sp-sub">HSC Study Tracker · Bangladesh</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>

<div id="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-ic">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 4h12M3 9h8M3 14h10" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <span class="logo-tx">Topper's Cave</span>
    </div>
    <div class="topacts">
      <div class="icbtn" onclick="openTheme()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M2.9 2.9l1.4 1.4M11.7 11.7l1.4 1.4M2.9 13.1l1.4-1.4M11.7 4.3l1.4-1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </div>
      <div class="icbtn" onclick="gp('about')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 7v5M8 5v.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
    </div>
  </div>

  <div class="content">
    <div id="p-home" class="page on"></div>
    <div id="p-track" class="page"></div>
    <div id="p-today" class="page"></div>
    <div id="p-timer" class="page"></div>
    <div id="p-store" class="page"></div>
    <div id="p-info" class="page"></div>
    <div id="p-about" class="page"></div>
  </div>

  <div class="bnav">
    <div class="bni on" onclick="gp('home')">
      <svg viewBox="0 0 20 20" fill="none"><path d="M3 9l7-6 7 6v8a1 1 0 01-1 1H4a1 1 0 01-1-1V9z" stroke="currentColor" stroke-width="1.4"/><path d="M7 18v-6h6v6" stroke="currentColor" stroke-width="1.4"/></svg>
      <span class="bni-lbl">হোম</span>
    </div>
    <div class="bni" onclick="gp('track')">
      <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M7 10l2 2 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="bni-lbl">ট্র্যাক</span>
    </div>
    <div class="bni" onclick="gp('today')">
      <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M7 2v3M13 2v3M3 9h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span class="bni-lbl">আজকের</span>
    </div>
    <div class="bni" onclick="gp('timer')">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="11" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M10 7.5v3.5l2 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M7.5 2h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span class="bni-lbl">টাইমার</span>
    </div>
    <div class="bni" onclick="gp('store')">
      <svg viewBox="0 0 20 20" fill="none"><path d="M3 6h14M3 10h14M3 14h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/></svg>
      <span class="bni-lbl">Store</span>
    </div>
    <div class="bni" onclick="gp('info')">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.4"/><path d="M10 9v6M10 7v.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="bni-lbl">তথ্য</span>
    </div>
  </div>
</div>

<div id="mcq-overlay" style="display:none"></div>

<div class="mo-ov" id="th-modal" onclick="closeTh(event)">
  <div class="mo-sh">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px;color:var(--tx)">থিম বেছে নাও</div>
    <div class="tg">
      <div class="to" id="t-dark" onclick="setTh('dark')"><div class="tsw" style="background:linear-gradient(135deg,#161B22,#4CAF50)"></div>ডার্ক</div>
      <div class="to" id="t-light" onclick="setTh('light')"><div class="tsw" style="background:linear-gradient(135deg,#F0F4F8,#2E7D32)"></div>লাইট</div>
      <div class="to" id="t-ocean" onclick="setTh('ocean')"><div class="tsw" style="background:linear-gradient(135deg,#061220,#0EA5E9)"></div>ওশান</div>
      <div class="to" id="t-purple" onclick="setTh('purple')"><div class="tsw" style="background:linear-gradient(135deg,#0F0A1E,#A855F7)"></div>পার্পল</div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
