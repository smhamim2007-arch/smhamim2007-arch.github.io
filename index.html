<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Topper's Cave</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Noto Sans,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;transition:background .3s,color .3s}
:root{--bg:#0D1117;--bg2:#161B22;--bg3:#1C2128;--bd:#30363D;--tx:#E6EDF3;--tx2:#8B949E;--tx3:#484F58;--ac:#4CAF50;--acl:#0D2414;--act:#6BCB77;--am:#FFA500;--aml:#1A1200;--rd:#F85149;--rdl:#1A0800;--bl:#58A6FF;--bll:#0D1F40;--pu:#BC8CFF;--pul:#1A0D40;--r:14px;--rs:10px;--sh:0 4px 24px rgba(0,0,0,.5)}
[data-theme=light]{--bg:#F0F4F8;--bg2:#FFFFFF;--bg3:#E8EEF5;--bd:#C8D3E0;--tx:#1A202C;--tx2:#4A5568;--tx3:#A0AEC0;--acl:#E8F5E9;--act:#2E7D32;--aml:#FFF8E1;--rdl:#FFEBEE;--bll:#E3F2FD;--pul:#F3E5F5;--sh:0 4px 24px rgba(0,0,0,.1)}
[data-theme=ocean]{--bg:#061220;--bg2:#0A1E30;--bg3:#0F2840;--bd:#1A3A55;--tx:#B8D4F0;--tx2:#6A9DC0;--tx3:#2A5070;--ac:#0EA5E9;--acl:#051520;--act:#38BDF8;--sh:0 4px 24px rgba(0,0,0,.6)}
[data-theme=purple]{--bg:#0F0A1E;--bg2:#1A1030;--bg3:#231540;--bd:#3D2870;--tx:#E0D0FF;--tx2:#9070C0;--tx3:#5040A0;--ac:#A855F7;--acl:#1A0A30;--act:#C084FC;--sh:0 4px 24px rgba(0,0,0,.6)}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .8s ease}
#splash.out{opacity:0;pointer-events:none}
.sp-cave{font-size:44px;font-weight:800;background:linear-gradient(135deg,var(--ac),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-family:serif;letter-spacing:-1px;animation:spu 1s ease forwards}
.sp-sub{font-size:13px;color:var(--tx2);margin-top:6px;animation:spu 1s .5s both}
.sp-bar{width:120px;height:3px;background:var(--bd);border-radius:2px;margin-top:24px;overflow:hidden;animation:spu 1s .3s both}
.sp-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--bl));border-radius:2px;animation:sfill 2.2s ease forwards}
@keyframes spu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes sfill{from{width:0}to{width:100%}}

/* LAYOUT */
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:12px 16px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px}
.logo-ic{width:34px;height:34px;background:linear-gradient(135deg,var(--ac),var(--bl));border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(74,200,80,.3)}
.logo-tx{font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--act),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-family:serif}
.topacts{display:flex;gap:6px}
.icbtn{width:34px;height:34px;border-radius:10px;background:var(--bg2);border:.5px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2)}
.icbtn:active{transform:scale(.94)}

.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 14px 16px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}
.page{display:none}
.page.on{display:block;animation:pin .2s ease}
@keyframes pin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* BOTTOM NAV */
.bnav{display:flex;background:var(--bg2);border-top:.5px solid var(--bd);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 2px 7px;cursor:pointer;gap:2px;color:var(--tx3);transition:color .15s}
.bni.on{color:var(--ac)}
.bni svg{width:20px;height:20px}
.bni-lbl{font-size:9px;font-weight:600;letter-spacing:.3px}

/* CARDS */
.card{background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:var(--sh)}
.card-accent{border-color:var(--ac)}
.ct{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:12px}
.sl{font-size:10px;color:var(--tx2);margin-bottom:5px;margin-top:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}

/* FORMS */
select,input[type=number],input[type=text]{width:100%;padding:10px 12px;border:.5px solid var(--bd);border-radius:var(--rs);background:var(--bg3);color:var(--tx);font-size:14px;font-family:inherit;-webkit-appearance:none;outline:none}
select:focus,input:focus{border-color:var(--ac)}
.chipw{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.chip{padding:6px 12px;border:.5px solid var(--bd);border-radius:20px;font-size:12px;cursor:pointer;background:var(--bg3);color:var(--tx2);user-select:none;transition:all .15s}
.chip.on{background:var(--acl);border-color:var(--ac);color:var(--act);font-weight:500}
.chip:active{transform:scale(.95)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.sc{padding:10px;border:.5px solid var(--bd);border-radius:var(--rs);font-size:13px;cursor:pointer;background:var(--bg3);color:var(--tx2);text-align:center;user-select:none;transition:all .15s}
.sc.on{background:var(--acl);border-color:var(--ac);color:var(--act);font-weight:500}

/* BUTTONS */
.btn{padding:11px 16px;border-radius:var(--rs);font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;border:none;width:100%;margin-top:10px;transition:all .15s;letter-spacing:.3px}
.btn:active{transform:scale(.97)}
.btp{background:linear-gradient(135deg,var(--ac),#2E7D32);color:#fff;box-shadow:0 3px 12px rgba(74,200,80,.3)}
.bts{background:var(--bg3);color:var(--tx);border:.5px solid var(--bd)}
.btd{background:linear-gradient(135deg,var(--rd),#b71c1c);color:#fff}
.btam{background:linear-gradient(135deg,var(--am),#e65100);color:#fff}
.brow{display:flex;gap:8px;margin-top:10px}
.brow .btn{margin-top:0}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px}
.bg{background:var(--acl);color:var(--act)}
.ba{background:var(--aml);color:var(--am)}
.br{background:var(--rdl);color:var(--rd)}
.bb{background:var(--bll);color:var(--bl)}
.bp{background:var(--pul);color:var(--pu)}

/* PROGRESS */
.pb{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .4s ease}
.pfg{background:linear-gradient(90deg,var(--ac),#81C784)}
.pfa{background:linear-gradient(90deg,var(--am),#FFB74D)}
.pfb{background:linear-gradient(90deg,var(--bl),#90CAF9)}

/* STATS */
.stg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sb{background:var(--bg3);border-radius:var(--rs);padding:12px;text-align:center;border:.5px solid var(--bd)}
.sn{font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--act),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.slb{font-size:10px;color:var(--tx2);margin-top:2px;font-weight:500}

/* TASKS */
.ti{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:.5px solid var(--bd)}
.ti:last-child{border-bottom:none}
.tc{min-width:20px;height:20px;border:1.5px solid var(--bd);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px;flex-shrink:0;transition:all .15s}
.tc.dn{background:var(--ac);border-color:var(--ac);color:#fff}
.tt{font-size:13px;color:var(--tx);line-height:1.4}
.tt.st{color:var(--tx3);text-decoration:line-through}
.sd{width:8px;height:8px;border-radius:3px;flex-shrink:0;margin-top:5px}

/* CHAPTER LIST */
.chs{max-height:280px;overflow-y:auto}
.chs::-webkit-scrollbar{width:2px}
.chs::-webkit-scrollbar-thumb{background:var(--bd);border-radius:1px}
.chi{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--bd);font-size:13px}
.chi:last-child{border-bottom:none}
.chi input[type=checkbox]{width:16px;height:16px;accent-color:var(--ac);cursor:pointer;flex-shrink:0}

/* DAY CARDS */
.dc{border:.5px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:10px;background:var(--bg2)}
.dc.tdy{border-color:var(--ac);box-shadow:0 0 12px rgba(74,200,80,.15)}
.dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}

/* TIMER */
.tw{text-align:center;padding:20px 0}
.tn{font-size:68px;font-weight:200;background:linear-gradient(135deg,var(--tx),var(--act));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-4px;font-variant-numeric:tabular-nums;line-height:1}
.tph{font-size:12px;color:var(--tx2);margin-top:6px;font-weight:500}
.pdots{display:flex;gap:8px;justify-content:center;margin:14px 0}
.pd{width:10px;height:10px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--bd)}
.pd.dnd{background:var(--ac);border-color:var(--ac);box-shadow:0 0 6px rgba(74,200,80,.5)}
.pd.acd{background:var(--am);border-color:var(--am)}

/* MCQ POP-UP OVERLAY */
.mcq-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:mfin .2s ease}
@keyframes mfin{from{opacity:0}to{opacity:1}}
.mcq-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:16px 16px 32px;width:100%;max-width:560px;border-top:.5px solid var(--bd);box-shadow:0 -8px 32px rgba(0,0,0,.5);animation:msu .25s ease}
@keyframes msu{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mcq-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mcq-tbar{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;margin-bottom:12px}
.mcq-tfill{height:100%;border-radius:2px;transition:width .1s linear;background:linear-gradient(90deg,var(--ac),var(--bl))}
.mcq-q{font-size:15px;font-weight:500;color:var(--tx);line-height:1.6;margin-bottom:14px}
.mcq-opts{display:flex;flex-direction:column;gap:8px}
.mcq-opt{padding:11px 14px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:14px;cursor:pointer;background:var(--bg3);color:var(--tx);text-align:left;font-family:inherit;line-height:1.4;transition:all .15s;font-weight:500}
.mcq-opt:active:not(:disabled){transform:scale(.98)}
.mcq-opt.ok{background:var(--acl);border-color:var(--ac);color:var(--act)}
.mcq-opt.ng{background:var(--rdl);border-color:var(--rd);color:var(--rd)}
.mcq-opt.rv{background:var(--acl);border-color:var(--ac);color:var(--act)}
.mcq-opt:disabled{cursor:default}
.mcq-res{padding:10px 13px;border-radius:var(--rs);font-size:12px;margin-top:10px;line-height:1.5;font-weight:500}
.mrok{background:var(--acl);color:var(--act)}
.mrng{background:var(--rdl);color:var(--rd)}

/* INFO PAGE */
.ir{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:.5px solid var(--bd);font-size:13px;gap:8px}
.ir:last-child{border-bottom:none}
.ik{color:var(--tx2);flex-shrink:0;min-width:90px;font-weight:500}
.gg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.gbox{text-align:center;padding:10px;border-radius:var(--rs);background:var(--bg3);border:.5px solid var(--bd)}

/* THEME MODAL */
.mo-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:none;align-items:flex-end}
.mo-ov.show{display:flex}
.mo-sh{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;border-top:.5px solid var(--bd);animation:msu .25s ease}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.to{padding:14px;border-radius:var(--rs);border:1.5px solid var(--bd);cursor:pointer;text-align:center;font-size:13px;color:var(--tx2);transition:all .15s;font-weight:500}
.to.at{border-color:var(--ac);color:var(--act);background:var(--acl)}
.tsw{width:28px;height:28px;border-radius:8px;margin:0 auto 8px}

/* STOREHOUSE */
.store-card{border-radius:var(--r);padding:18px;margin-bottom:14px;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;display:block;text-decoration:none}
.store-card:active{transform:scale(.97)}
.store-card-1{background:linear-gradient(135deg,#1a2a1a,#0a3a1a);border:1px solid var(--ac)}
.store-card-2{background:linear-gradient(135deg,#1a1a3a,#0a1a4a);border:1px solid var(--bl)}
.store-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.05),transparent)}
.store-icon{font-size:28px;margin-bottom:10px}
.store-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:8px}
.store-features{list-style:none;padding:0}
.store-features li{font-size:13px;color:rgba(255,255,255,.8);padding:2px 0;font-weight:500}
.store-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:22px;color:rgba(255,255,255,.4)}
.store-badge{display:inline-block;background:rgba(255,255,255,.15);border-radius:20px;padding:3px 10px;font-size:11px;color:#fff;font-weight:600;margin-top:8px;backdrop-filter:blur(4px)}

/* ABOUT */
.ab-center{text-align:center;padding:2rem 1rem}
.ab-logo{width:80px;height:80px;background:linear-gradient(135deg,var(--ac),var(--bl));border-radius:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 24px rgba(74,200,80,.3)}

/* MISC */
.empty{text-align:center;padding:3rem 1rem;color:var(--tx2)}
.div{height:.5px;background:var(--bd);margin:12px 0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.scroll-w{max-height:400px;overflow-y:auto}
.scroll-w::-webkit-scrollbar{display:none}
</style>
</head>
<body data-theme="dark">

<!-- SPLASH -->
<div id="splash">
  <div class="sp-cave">Topper's Cave</div>
  <div class="sp-sub">HSC Study Tracker · Bangladesh</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-ic">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 4h12M3 9h8M3 14h10" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <span class="logo-tx">Topper's Cave</span>
    </div>
    <div class="topacts">
      <div class="icbtn" onclick="openTheme()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M2.9 2.9l1.4 1.4M11.7 11.7l1.4 1.4M2.9 13.1l1.4-1.4M11.7 4.3l1.4-1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </div>
      <div class="icbtn" onclick="gp('about')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 7v5M8 5v.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
    </div>
  </div>

  <div class="content">
    <div id="p-home" class="page on"></div>
    <div id="p-track" class="page"></div>
    <div id="p-today" class="page"></div>

      <span class="bni-lbl">হোম</span>

    </div>
    <div class="bni" onclick="gp('today')">
      <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M7 2v3M13 2v3M3 9h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span class="bni-lbl">আজকের</span>
    </div>
    <div class="bni" onclick="gp('timer')">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="11" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M10 7.5v3.5l2 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M7.5 2h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span class="bni-lbl">টাইমার</span>
    </div>
    <div class="bni" onclick="gp('store')">
      <svg viewBox="0 0 20 20" fill="none"><path d="M3 6h14M3 10h14M3 14h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/></svg>
      <span class="bni-lbl">Store</span>

    <div class="bni" onclick="gp('info')">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.4"/><path d="M10 9v6M10 7v.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="bni-lbl">তথ্য</span>
    </div>
  </div>
</div>

<!-- MCQ OVERLAY (for break time) -->
<div id="mcq-overlay" style="display:none"></div>

<!-- THEME MODAL -->
<div class="mo-ov" id="th-modal" onclick="closeTh(event)">
  <div class="mo-sh">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px;color:var(--tx)">থিম বেছে নাও</div>
    <div class="tg">
      <div class="to" id="t-dark" onclick="setTh('dark')"><div class="tsw" style="background:linear-gradient(135deg,#161B22,#4CAF50)"></div>ডার্ক</div>
      <div class="to" id="t-light" onclick="setTh('light')"><div class="tsw" style="background:linear-gradient(135deg,#F0F4F8,#2E7D32)"></div>লাইট</div>
      <div class="to" id="t-ocean" onclick="setTh('ocean')"><div class="tsw" style="background:linear-gradient(135deg,#061220,#0EA5E9)"></div>ওশান</div>
      <div class="to" id="t-purple" onclick="setTh('purple')"><div class="tsw" style="background:linear-gradient(135deg,#0F0A1E,#A855F7)"></div>পার্পল</div>
    </div>
  </div>
</div>

// SCHEDULE
function buildSched(ss,sc,div,days){
  let all=[];
  ss.forEach((subj,si)=>{const chs=HSC[div].subjects[subj].ch;(sc[subj]||[]).forEach(ci=>{const ch=chs[ci];for(let pt=0;pt<ch.sz;pt++)all.push({subject:subj,si,chapter:ch.n,part:ch.sz>1?pt+1:0,tp:ch.sz,priority:ch.p,size:ch.sz,done:false});});});
  if(!all.length)return[];
  let byS={};all.forEach(s=>{if(!byS[s.subject])byS[s.subject]=[];byS[s.subject].push(s);});
  const so=Object.keys(byS).sort((a,b)=>Math.min(...byS[a].map(x=>x.priority))-Math.min(...byS[b].map(x=>x.priority)));
  so.forEach(s=>byS[s].sort((a,b)=>a.priority-b.priority||a.part-b.part));
  let il=[];const ml=Math.max(...so.map(s=>byS[s].length));
  for(let i=0;i<ml;i++)so.forEach(s=>{if(i<byS[s].length)il.push(byS[s][i]);});
  const ppd=Math.ceil(il.length/days);let sched=[];const td=new Date();
  for(let d=0;d<days;d++){const sl=il.slice(d*ppd,(d+1)*ppd);if(!sl.length)break;const dt=new Date(td);dt.setDate(td.getDate()+d);sched.push({day:d+1,ds:dt.toLocaleDateString('bn-BD'),di:dt.toISOString().slice(0,10),tasks:sl.map(s=>({...s}))});}
  return sched;
}

const s2t=(s)=>String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');

  <select onchange="ST.pomo.dmin=parseInt(this.value);sv()">${[[120,'২ ঘণ্টা'],[180,'৩ ঘণ্টা'],[240,'৪ ঘণ্টা ✓'],[300,'৫ ঘণ্টা'],[360,'৬ ঘণ্টা']].map(([v,l])=>`<option value="${v}" ${p.dmin===v?'selected':''}>${l}</option>`).join('')}</select>
  <div style="background:var(--bg3);border-radius:var(--rs);padding:12px;margin:10px 0;font-size:12px;color:var(--tx2);border:.5px solid var(--bd)">💡 ব্রেকে MCQ পপআপ হবে · একই প্রশ্ন বারবার আসবে না · ব্রেক: ${p.dur<=30?'৫–৭':'১০–১৫'} মিনিট</div>
  <button class="btn btp" onclick="startP()">▶ টাইমার শুরু করো</button>
  ${p.tsec>0?`<div style="text-align:center;margin-top:12px;font-size:13px;color:var(--tx2)">আজ পড়েছো: <strong style="color:var(--act)">${Math.floor(p.tsec/60)} মিনিট</strong> · ${p.ptoday}টি পোমো সম্পন্ন</div>`:''}
  </div>`;
}
function setTgt(t){ST.pomo.tgt=t;sv();rTimer();}
function setDur(v){ST.pomo.dur=v;ST.pomo.brk=v<=30?6:12;sv();rTimer();}
function startP(){
  if(!ST.pomo.div){alert('বিভাগ সিলেক্ট করো');return;}
  if(ST.pomo.div==='science'&&!ST.pomo.tgt){alert('ভর্তির লক্ষ্য সিলেক্ট করো');return;}
  PM.phase='study';PM.rem=ST.pomo.dur*60;PM.used=[];rStudy();runST();
}
function rStudy(){
  const p=ST.pomo,pct=Math.min(100,Math.round(p.tsec/(p.dmin*60)*100)),sp=Math.round((1-PM.rem/(p.dur*60))*100);
  const dots=Array.from({length:Math.max(4,p.ptoday+2)},(_,i)=>`<div class="pd ${i<p.ptoday?'dnd':i===p.ptoday?'acd':''}"></div>`).join('');
  document.getElementById('p-timer').innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="badge bg">📖 পড়ার সময়</span><span style="font-size:12px;color:var(--tx2);font-weight:500">পোমো #${p.ptoday+1}</span></div>
  <div class="pdots">${dots}</div>
  <div class="tw"><div class="tn" id="td">${s2t(PM.rem)}</div><div class="tph">${p.dur} মিনিটের সেশন চলছে</div></div>
  <div class="pb" style="margin-bottom:4px"><div class="pf pfg" id="tsb" style="width:${sp}%"></div></div>
  <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--tx2);margin-bottom:14px;margin-top:4px"><span>সেশন অগ্রগতি</span><span>${sp}%</span></div>
  <div class="stg"><div class="sb"><div class="sn">${Math.floor(p.tsec/60)}</div><div class="slb">আজ (মিনিট)</div></div><div class="sb"><div class="sn">${Math.max(0,p.dmin-Math.floor(p.tsec/60))}</div><div class="slb">টার্গেট বাকি</div></div><div class="sb"><div class="sn">${p.ptoday}</div><div class="slb">পোমো ✓</div></div></div>
  <div class="sl">দৈনিক লক্ষ্য (${p.dmin} মিনিট)</div><div class="pb"><div class="pf pfg" style="width:${pct}%"></div></div>
  <div style="text-align:right;font-size:11px;color:var(--tx2);margin-top:3px;margin-bottom:14px">${pct}%</div>
  <button class="btn btd" onclick="stopP()">⏹ বন্ধ করো ও সেভ করো</button></div>`;
}
function runST(){
  clearInterval(PM.timer);PM.timer=setInterval(()=>{
    PM.rem--;ST.pomo.tsec++;ST.pomo.ld=new Date().toISOString().slice(0,10);sv();
    const el=document.getElementById('td'),bar=document.getElementById('tsb');
    if(el)el.textContent=s2t(PM.rem);
    if(bar)bar.style.width=Math.round((1-PM.rem/(ST.pomo.dur*60))*100)+'%';
    if(PM.rem<=0){clearInterval(PM.timer);ST.pomo.ptoday++;sv();sN('Topper\'s Cave ⏰','পোমো #'+ST.pomo.ptoday+' শেষ! ব্রেক নাও।');startBrk();}
  },1000);
}
function stopP(){clearInterval(PM.timer);clearInterval(PM.bt);clearInterval(PM.mt);PM.phase='idle';closeMCQ();rTimer();}

// MCQ SYSTEM
function getMCQPool(){
  if(ST.pomo.div==='science')return SCIENCE_MCQ.map((q,i)=>({...q,idx:i}));
  return HUM_MCQ.map((q,i)=>({q:q.q,o:q.o,a:q.a,e:q.e,id:i+1000,idx:i+1000}));
}
function startBrk(){
  PM.phase='break';PM.brem=ST.pomo.brk*60;PM.mans=false;PM.used=[];PM.mok=0;PM.mtot=0;
  rBreak();runBT();nxQ();
}
function rBreak(){
  // Timer stays visible, MCQ pops up as overlay
  const p=ST.pomo;
  document.getElementById('p-timer').innerHTML=`<div class="card" style="border-color:var(--am)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="badge ba">☕ ব্রেক টাইম</span><span style="font-size:18px;font-weight:700;color:var(--am)" id="bcd">${s2t(PM.brem)}</span></div>
  <div style="text-align:center;padding:20px 0"><div style="font-size:40px;margin-bottom:8px">🧠</div><div style="font-size:14px;color:var(--tx2)">MCQ প্র্যাকটিস চলছে...</div><div style="font-size:12px;color:var(--tx3);margin-top:4px">সঠিক: <strong id="msc" style="color:var(--act)">${PM.mok}</strong> / ${PM.mtot}</div></div>
  <div class="stg" style="margin-bottom:10px"><div class="sb"><div class="sn">${ST.pomo.ptoday}</div><div class="slb">পোমো সম্পন্ন</div></div><div class="sb"><div class="sn">${Math.floor(ST.pomo.tsec/60)}</div><div class="slb">মোট মিনিট</div></div><div class="sb"><div class="sn" id="brk-pct">0%</div><div class="slb">MCQ সঠিক</div></div></div>
  <button class="btn btp" onclick="endBE()">📖 ব্রেক শেষ, পড়তে বসো →</button></div>`;
}
function runBT(){clearInterval(PM.bt);PM.bt=setInterval(()=>{PM.brem--;const el=document.getElementById('bcd');if(el)el.textContent=s2t(PM.brem);if(PM.brem<=0){clearInterval(PM.bt);clearInterval(PM.mt);closeMCQ();endBrk();}},1000);}

function showMCQ(){
  const q=PM.curQ;if(!q)return;
  const keys=['a','b','c','d'];
  const opts=q.options?keys.map(k=>q.options[k]):q.o;
  const ansKey=q.answer||keys[q.a];
  const ansIdx=q.answer?keys.indexOf(q.answer):q.a;
  const subj=q.subject||'';
  document.getElementById('mcq-overlay').style.display='block';
  document.getElementById('mcq-overlay').innerHTML=`<div class="mcq-overlay" onclick="">
  <div class="mcq-sheet">
    <div class="mcq-hdr">
      <span class="badge bb">${subj}</span>
      <div style="display:flex;align-items:center;gap:8px"><span class="badge ba">${PM.mtot+1}টি প্রশ্ন</span><span style="font-size:13px;font-weight:700;color:var(--am)" id="mtc">${PM.mrem}s</span></div>
    </div>
    <div class="mcq-tbar"><div class="mcq-tfill" id="mtf" style="width:100%"></div></div>
    <div class="mcq-q">${q.question||q.q}</div>
    <div class="mcq-opts">${opts.map((o,i)=>`<button class="mcq-opt" id="op${i}" onclick="ansQ(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
    <div id="mres"></div>
  </div></div>`;
}
function closeMCQ(){document.getElementById('mcq-overlay').style.display='none';document.getElementById('mcq-overlay').innerHTML='';}

function nxQ(){
  clearInterval(PM.mt);
  const pool=getMCQPool();
  PM.mlim=ST.pomo.tgt==='engineering'?60:35;
  let av=pool.filter(q=>!PM.used.includes(q.id||q.idx));
  if(!av.length){PM.used=[];av=pool;}
  const q=av[Math.floor(Math.random()*av.length)];
  PM.used.push(q.id||q.idx);PM.curQ=q;PM.mans=false;PM.mrem=PM.mlim;
  showMCQ();
  PM.mt=setInterval(()=>{PM.mrem--;const bar=document.getElementById('mtf'),cnt=document.getElementById('mtc');if(bar)bar.style.width=Math.round(PM.mrem/PM.mlim*100)+'%';if(cnt)cnt.textContent=PM.mrem+'s';if(PM.mrem<=0&&!PM.mans){clearInterval(PM.mt);aRev();}},1000);
}
function ansQ(chosen){
  if(PM.mans)return;clearInterval(PM.mt);PM.mans=true;PM.mtot++;
  const q=PM.curQ;
  const keys=['a','b','c','d'];
  const ansIdx=q.answer?keys.indexOf(q.answer):q.a;
  const ok=chosen===ansIdx;if(ok)PM.mok++;
  document.querySelectorAll('.mcq-opt').forEach((b,i)=>{b.disabled=true;if(i===ansIdx)b.classList.add('ok');else if(i===chosen&&!ok)b.classList.add('ng');});
  const res=document.getElementById('mres');
  const exp=q.e||q.explanation||'';
  if(res)res.innerHTML=`<div class="mcq-res ${ok?'mrok':'mrng'}">${ok?'✅ সঠিক উত্তর!':'❌ ভুল। সঠিক: '+String.fromCharCode(65+ansIdx)+'. '+(q.options?q.options[keys[ansIdx]]:q.o[ansIdx])}${exp?'<br><span style="font-size:11px;opacity:.85;font-weight:400">'+exp+'</span>':''}</div>`;
  const sc=document.getElementById('msc');if(sc)sc.textContent=PM.mok;
  const pp=document.getElementById('brk-pct');if(pp)pp.textContent=PM.mtot?Math.round(PM.mok/PM.mtot*100)+'%':'0%';
  setTimeout(()=>{if(PM.brem>0&&PM.phase==='break')nxQ();},2500);
}
function aRev(){
  if(PM.mans)return;PM.mans=true;PM.mtot++;
  const q=PM.curQ;const keys=['a','b','c','d'];const ansIdx=q.answer?keys.indexOf(q.answer):q.a;
  document.querySelectorAll('.mcq-opt').forEach((b,i)=>{b.disabled=true;if(i===ansIdx)b.classList.add('rv');});
  const res=document.getElementById('mres');
  if(res)res.innerHTML=`<div class="mcq-res mrng">⏱ সময় শেষ! সঠিক: ${String.fromCharCode(65+ansIdx)}. ${q.options?q.options[keys[ansIdx]]:q.o[ansIdx]}</div>`;
  const pp=document.getElementById('brk-pct');if(pp)pp.textContent=PM.mtot?Math.round(PM.mok/PM.mtot*100)+'%':'0%';
  setTimeout(()=>{if(PM.brem>0&&PM.phase==='break')nxQ();},2500);
}
function endBrk(){closeMCQ();PM.phase='study';PM.rem=ST.pomo.dur*60;sN('Topper\'s Cave 📖','নতুন পোমোডোরো শুরু!');rStudy();runST();}
function endBE(){clearInterval(PM.bt);clearInterval(PM.mt);endBrk();}

try{if(typeof Notification!=='undefined'&&Notification.permission==='default')Notification.requestPermission();}catch(e){}
